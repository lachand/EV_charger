# Lovelace card example for simplified smart charging.
# Duplicate and replace every <...> placeholder with your real entity IDs.
type: vertical-stack
cards:
  - type: markdown
    content: |
      ## Charge intelligente (simplifiee)
      Mode surplus court: on/off + seuils batterie.

  - type: entities
    title: Pilotage
    show_header_toggle: false
    entities:
      - entity: switch.<charger_charge_session_switch_entity_id>
      - entity: number.<charger_charge_current_number_entity_id>
      - entity: switch.<charger_surplus_mode_switch_entity_id>
      - entity: binary_sensor.<charger_surplus_regulation_active_entity_id>

  - type: entities
    title: Batterie (hysteresis)
    show_header_toggle: false
    entities:
      - entity: number.<charger_surplus_battery_soc_high_threshold_pct_entity_id>
      - entity: number.<charger_surplus_battery_soc_low_threshold_pct_entity_id>

  - type: grid
    columns: 2
    square: false
    cards:
      - type: button
        name: Pause 20 min
        icon: mdi:pause-circle-outline
        tap_action:
          action: call-service
          service: tuya_ev_charger.pause_surplus
          data:
            duration_minutes: 20
            # entry_id: "<entry_id>"
      - type: button
        name: Force 30 min
        icon: mdi:flash
        tap_action:
          action: call-service
          service: tuya_ev_charger.force_charge_for
          data:
            duration_minutes: 30
            # current_a: 6
            # entry_id: "<entry_id>"
