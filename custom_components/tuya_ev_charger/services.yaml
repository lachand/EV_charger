force_charge_for:
  name: Force charge for duration
  description: Temporarily force charging for a given duration in minutes.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required when multiple chargers are configured.
      selector:
        text:
    duration_minutes:
      name: Duration minutes
      description: Number of minutes to force charging.
      required: true
      selector:
        number:
          min: 0
          max: 1440
          step: 1
          mode: box
    current_a:
      name: Forced current (A)
      description: Optional current setpoint to use while force mode is active.
      selector:
        number:
          min: 6
          max: 32
          step: 1
          mode: box

pause_surplus:
  name: Pause surplus regulation
  description: Pause surplus regulation for a given duration in minutes.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required when multiple chargers are configured.
      selector:
        text:
    duration_minutes:
      name: Duration minutes
      description: Number of minutes to pause surplus regulation.
      required: true
      selector:
        number:
          min: 0
          max: 1440
          step: 1
          mode: box

dry_run_surplus:
  name: Dry run surplus decision
  description: Simulate the current surplus decision without sending commands to the charger.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required when multiple chargers are configured.
      selector:
        text:

set_surplus_profile:
  name: Set surplus profile
  description: Apply a predefined surplus tuning profile.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required when multiple chargers are configured.
      selector:
        text:
    profile:
      name: Profile
      description: Preset profile to apply.
      required: true
      selector:
        select:
          options:
            - balanced
            - aggressive
            - conservative
    mode:
      name: Surplus mode
      description: Optional surplus mode override.
      selector:
        select:
          options:
            - classic
            - zero_injection

profile_assistant:
  name: Profile assistant
  description: Analyze DPS payload and suggest the closest charger profile mapping.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required when multiple chargers are configured.
      selector:
        text:
    apply:
      name: Apply suggestion
      description: If true, automatically apply the suggested charger profile.
      selector:
        boolean:
